name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/build-windows.yml'
      - 'backend/**'
      - 'frontend/**'
      - 'build_win.bat'

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        shell: cmd
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        shell: cmd
        run: npm run build

      - name: Install backend dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install -r backend\requirements.txt pyinstaller pytest

      - name: Run backend tests
        shell: cmd
        run: pytest backend\tests

      - name: Build Windows package
        working-directory: backend
        shell: cmd
        run: |
          if exist build rmdir /s /q build
          if exist dist rmdir /s /q dist
          del /q *.spec 2>nul
          pyinstaller --name "送货单生成系统" --windowed --noconfirm --clean --add-data "templates;templates" --add-data "..\frontend\dist;static" desktop.py

      - name: Zip packaged app
        shell: pwsh
        run: Compress-Archive -Force -Path 'backend/dist/送货单生成系统' -DestinationPath 'backend/dist/送货单生成系统-win-x64.zip'

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: delivery-note-windows-x64
          path: backend/dist/送货单生成系统-win-x64.zip
          if-no-files-found: error
